name: Build and Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        run: |
          Invoke-WebRequest -Uri "https://goatcorp.github.io/dalamud-distrib/stg/latest.zip" -OutFile dalamud.zip
          $dest = "$env:APPDATA\XIVLauncher\addon\Hooks\dev"
          New-Item -ItemType Directory -Force -Path $dest | Out-Null
          Expand-Archive dalamud.zip -DestinationPath $dest -Force
        shell: pwsh

      - name: Get version
        id: version
        run: |
          $version = (Select-Xml -Path "src/PanacheUI.csproj" -XPath "//Version").Node.InnerText
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
        shell: pwsh

      - name: Build
        run: dotnet build src/PanacheUI.csproj --configuration Release --no-incremental
        shell: pwsh

      - name: Package
        run: |
          $bin = "src/bin/x64/Release"
          $dist = "dist"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null

          Copy-Item "$bin/PanacheUI.dll" $dist
          Copy-Item "PanacheUI.json"     $dist
          Copy-Item "$bin/SkiaSharp.dll" $dist -ErrorAction SilentlyContinue

          # Bundle libSkiaSharp in the runtimes subfolder so .NET finds it
          $native = "$dist/runtimes/win-x64/native"
          New-Item -ItemType Directory -Force -Path $native | Out-Null
          Copy-Item "$bin/runtimes/win-x64/native/libSkiaSharp.dll" $native

          Compress-Archive -Path "$dist/*" -DestinationPath PanacheUI.zip -Force
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: PanacheUI
          path: dist/

      - name: Update pluginmaster.json version
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $json = @(Get-Content pluginmaster.json | ConvertFrom-Json)
          $json[0].AssemblyVersion        = $version
          $json[0].TestingAssemblyVersion = $version
          $json | ConvertTo-Json -Depth 10 -AsArray | Set-Content pluginmaster.json
        shell: pwsh

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: v${{ steps.version.outputs.VERSION }}
          files: PanacheUI.zip
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated pluginmaster.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pluginmaster.json
          git diff --staged --quiet || git commit -m "ci: update pluginmaster.json to v${{ steps.version.outputs.VERSION }}"
          git push
        shell: pwsh
